<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>vhuag repositories</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div>
          <p class="eyebrow">GitHub Pages repo index</p>
          <h1>vhuag repositories</h1>
          <p class="intro">
            Public and private repository metadata generated by GitHub Actions.
          </p>
        </div>
        <a class="profile-link" href="https://github.com/vhuag" rel="noreferrer">GitHub profile</a>
      </header>

      <section class="summary-grid" aria-label="Repository summary">
        <article class="summary-card">
          <span class="summary-label">Total</span>
          <strong id="totalCount">0</strong>
        </article>
        <article class="summary-card">
          <span class="summary-label">Public</span>
          <strong id="publicCount">0</strong>
        </article>
        <article class="summary-card">
          <span class="summary-label">Private</span>
          <strong id="privateCount">0</strong>
        </article>
        <article class="summary-card">
          <span class="summary-label">Pages</span>
          <strong id="pagesCount">0</strong>
        </article>
      </section>

      <section class="toolbar" aria-label="Repository filters">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Name, language, topic">
        </label>
        <div class="segmented-control" role="group" aria-label="Visibility">
          <button class="active" type="button" data-visibility="all">All</button>
          <button type="button" data-visibility="public">Public</button>
          <button type="button" data-visibility="private">Private</button>
        </div>
      </section>

      <div class="meta-row">
        <span id="updatedAt">Waiting for repo data</span>
        <button id="clearFilters" class="text-button" type="button">Clear filters</button>
      </div>

      <main>
        <div id="status" class="status">Loading repository data...</div>
        <section id="repoList" class="repo-grid" aria-live="polite"></section>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
